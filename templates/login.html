{% extends "base.html" %}

{% block title %}Login - Thermal Security System{% endblock %}

{% block content %}
<div class="login-container">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-4">
                <!-- Login Card -->
                <div class="card shadow-lg border-danger">
                    <div class="card-body p-5">
                        <!-- Logo and Title -->
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock-fill text-danger" style="font-size: 4rem;"></i>
                            <h2 class="mt-3 text-light">Security System</h2>
                            <p class="text-light">Thermal Home Security & Alert</p>
                        </div>
                        
                        <!-- Error Alert -->
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endif %}
                        
                        <!-- Login Form -->
                        <form method="POST" action="{{ url_for('login') }}">
                            <!-- Username Field -->
                            <div class="mb-3">
                                <label for="username" class="form-label text-light">
                                    <i class="bi bi-person"></i> Username
                                </label>
                                <input type="text" 
                                       class="form-control bg-dark text-light border-secondary" 
                                       id="username" 
                                       name="username" 
                                       placeholder="Enter username"
                                       required 
                                       autofocus>
                            </div>
                            
                            <!-- Password Field -->
                            <div class="mb-4">
                                <label for="password" class="form-label text-light">
                                    <i class="bi bi-lock"></i> Password
                                </label>
                                <input type="password" 
                                       class="form-control bg-dark text-light border-secondary" 
                                       id="password" 
                                       name="password" 
                                       placeholder="Enter password"
                                       required>
                            </div>
                            
                            <!-- Login Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-danger btn-lg">
                                    <i class="bi bi-box-arrow-in-right"></i> Login
                                </button>
                            </div>
                        </form>
                        
                        <!-- Info Text -->
                        <div class="mt-4 text-center">
                            <small class="text-light">
                                <i class="bi bi-info-circle"></i> 
                                Authorized access only
                            </small>
                        </div>
                    </div>
                </div>
                
                <!-- System Info -->
                <div class="text-center mt-3">
                    <small class="text-light">
                        <i class="bi bi-cpu"></i> Powered by Raspberry Pi 4 
                        <span class="ms-2"><i class="bi bi-thermometer-half"></i> Thermal Monitoring Active</span>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
